# portfolio-monitoring router policy — qwen → sonnet → opus ladder.
# The numeric checks are pure Python (the "exact" half of the split). The model only
# triages and narrates — basic judgment -> sonnet; the confidence guard promotes a
# weak triage to opus. Nothing here can flip a deterministic breach result.
default: sonnet
allow_local_fallback: true
allow_claude_fallback: true

routes:
  classification: qwen
  extraction:     qwen
  screening:      qwen
  summarization:  qwen
  synthesis:      sonnet
  reasoning:      sonnet
  drafting:       sonnet
  judgment:       sonnet        # green/yellow/red triage narrative
