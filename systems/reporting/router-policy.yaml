# reporting router policy — qwen → sonnet → opus ladder.
# Drafting the final memo/letter is the highest-judgment, client-facing step -> opus.
# Upstream synthesis/reasoning is basic judgment -> sonnet. Bulk text work -> qwen.
default: opus
allow_local_fallback: true
allow_claude_fallback: true

routes:
  classification: qwen
  extraction:     qwen
  screening:      qwen
  summarization:  qwen
  reasoning:      sonnet
  synthesis:      sonnet
  drafting:       opus          # the memo / investor letter (final, client-facing)
  judgment:       opus
