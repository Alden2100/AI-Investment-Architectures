# valuation router policy — qwen → sonnet → opus ladder.
# Every number (DCF, comps, scenarios) is computed in Python by the skills. The model
# only narrates: reconcile the three methods into a range + recommendation. The
# narrative steps run on sonnet; the confidence guard promotes a weak read to opus.
default: sonnet
allow_local_fallback: true
allow_claude_fallback: true

routes:
  classification: qwen
  extraction:     qwen
  screening:      qwen
  summarization:  qwen
  reasoning:      sonnet        # triangulate DCF vs comps vs scenarios
  synthesis:      sonnet
  drafting:       sonnet
  judgment:       sonnet
