# idea-sourcing router policy — qwen → sonnet → opus ladder (POLICY, not mechanism).
# Bulk/cheap work -> qwen. Ranking the dossier into a shortlist is basic judgment ->
# sonnet; the engine's confidence guard promotes a low-confidence / invalid ranking
# one rung to opus automatically.
default: opus
allow_local_fallback: true     # a Claude rung down -> use qwen instead of stalling
allow_claude_fallback: true    # Ollama down -> step up to Claude instead of stalling

routes:
  classification: qwen          # catalyst-flagger event tagging
  extraction:     qwen
  screening:      qwen          # universe screening pre-filter
  summarization:  qwen          # news / headline digestion
  debate_generate: qwen         # confirming/disconfirming evidence (confidence guard escalates hard ones)
  synthesis:      sonnet        # ranking the dossier into a shortlist (confidence guard promotes hard ones)
  reasoning:      sonnet
  drafting:       opus
  judgment:       opus
  debate_reconcile: opus        # evidence-reconciler / ranking reconcile (high rung; the escalation tier)
