# governance-audit router policy — qwen → sonnet → opus ladder.
# Bulk/cheap -> qwen. The governance narrative is basic judgment -> sonnet; the
# confidence guard promotes a weak read to opus.
default: sonnet
allow_local_fallback: true
allow_claude_fallback: true
routes:
  classification: qwen
  extraction: qwen
  screening: qwen
  summarization: qwen
  reasoning: sonnet
  synthesis: sonnet
  drafting: sonnet
  judgment: sonnet
