# filing-intelligence router policy.
# Filings are long: summarize/extract cheaply on local qwen3.5:9b; reserve the
# multi-lens synthesis (the Brief) and competitive reasoning for Claude.
default: claude
allow_local_fallback: true
allow_claude_fallback: true

routes:
  classification: local
  extraction:     local        # pull structured bits from filing text
  screening:      local
  summarization:  local        # filing-summarizer / earnings-call-summarizer (high volume)
  synthesis:      claude        # the Brief — reconcile three lenses (judgment)
  reasoning:      claude        # moat-analyzer competitive read
  drafting:       claude
  judgment:       claude
